; Costco Cart Scanner — ESP32-C3 + GM65 + SSD1306
;
; Two environments:
;   esp32-c3 — real firmware build (needs a board attached to flash/monitor)
;   native   — host-side unit tests, no hardware needed

[platformio]
default_envs = esp32-c3

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
board_build.filesystem = littlefs
; Libraries below are placeholders for M2+. Unused in M1, safe to keep.
lib_deps =
    bblanchon/ArduinoJson@^7.0
    olikraus/U8g2@^2.35

[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -I src
